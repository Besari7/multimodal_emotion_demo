model:
  checkpoint: facebook/wav2vec2-base
  output_embedding_dim: 256

train:
  optimizer: adamw
  head_lr: 2e-4
  backbone_lr: 2e-5
  full_unfreeze_backbone_lr: 1e-5
  batch_size: 16
  max_epochs: 30
  early_stopping_patience: 5
  weight_decay: 0.01
  label_smoothing: 0.05
  scheduler: cosine_with_warmup
  warmup_ratio: 0.1

freeze_schedule:
  - epochs: [1, 3]
    freeze: feature_extractor,encoder_0_9
  - epochs: [4, 8]
    unfreeze: encoder_10_11
  - epochs: [9, 30]
    unfreeze: all
