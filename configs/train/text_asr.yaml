regime: asr

asr:
  checkpoint: openai/whisper-large-v3
  language: en
  task: transcribe
  beam_size: 5
  low_conf_threshold: 0.6

model:
  checkpoint: bert-base-uncased
  output_embedding_dim: 256
  max_length: 192
  context_window_prev_utterances: 2

train:
  optimizer: adamw
  head_lr: 2e-4
  backbone_lr: 2e-5
  batch_size: 32
  max_epochs: 20
  early_stopping_patience: 4
  weight_decay: 0.01
  label_smoothing: 0.05
  scheduler: cosine_with_warmup
  warmup_ratio: 0.1

freeze_schedule:
  - epochs: [1, 2]
    freeze: embeddings,encoder_0_7
  - epochs: [3, 5]
    unfreeze: encoder_8_11
  - epochs: [6, 20]
    unfreeze: all
